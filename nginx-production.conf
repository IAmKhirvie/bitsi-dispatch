# ==============================================================================
# BITSI Dispatch — Nginx Production Configuration
# ==============================================================================
#
# Place this file at:
#   /etc/nginx/sites-available/bitsi-dispatch
#
# Then enable it:
#   sudo ln -s /etc/nginx/sites-available/bitsi-dispatch /etc/nginx/sites-enabled/
#   sudo nginx -t
#   sudo systemctl reload nginx
#
# Prerequisites:
#   - PHP 8.2-FPM running on socket /run/php/php8.2-fpm.sock
#   - SSL certificate at /etc/letsencrypt/live/your-domain.com/fullchain.pem
#   - Your domain pointing to the server
# ==============================================================================

server {
    listen 80;
    server_name your-domain.com www.your-domain.com;

    # Redirect HTTP → HTTPS
    return 301 https://$server_name$request_uri;
}

server {
    listen 443 ssl http2;
    server_name your-domain.com www.your-domain.com;

    # ========== SSL (Let's Encrypt / Certbot) ==========
    ssl_certificate     /etc/letsencrypt/live/your-domain.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/your-domain.com/privkey.pem;

    # Modern TLS config (Mozilla Intermediate)
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:DHE-RSA-AES128-GCM-SHA256:DHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers off;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;
    ssl_session_tickets off;

    # OCSP Stapling
    ssl_stapling on;
    ssl_stapling_verify on;
    resolver 1.1.1.1 8.8.8.8 valid=300s;
    resolver_timeout 5s;

    # Security headers (duplicated from .htaccess for non-Apache servers)
    add_header X-Content-Type-Options nosniff always;
    add_header X-Frame-Options SAMEORIGIN always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "geolocation=(), microphone=(), camera=(), payment=()" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;

    # Root directory — must point to Laravel's public/ folder
    root /var/www/bitsi-dispatch/public;

    index index.php index.html;

    # Character set
    charset utf-8;

    # ========== Logging ==========
    access_log /var/log/nginx/bitsi-access.log;
    error_log  /var/log/nginx/bitsi-error.log;

    # ========== Static asset caching ==========
    location ~* \.(jpg|jpeg|gif|png|webp|svg|ico|css|js|ttf|woff|woff2|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
        log_not_found off;
    }

    # ========== Security: block sensitive files ==========
    location ~ /\. {
        deny all;
        access_log off;
        log_not_found off;
    }

    location ~ ^/(storage|vendor)/.*$ {
        deny all;
    }

    location = /favicon.ico {
        log_not_found off;
        access_log off;
    }

    location = /robots.txt {
        log_not_found off;
        access_log off;
    }

    # ========== Laravel front-controller ==========
    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    # ========== PHP-FPM ==========
    location ~ \.php$ {
        fastcgi_pass unix:/run/php/php8.2-fpm.sock;
        fastcgi_index index.php;
        fastcgi_param SCRIPT_FILENAME $realpath_root$fastcgi_script_name;
        include fastcgi_params;

        # Laravel-specific FastCGI parameters
        fastcgi_param LARAVEL_OCTANE    off;
        fastcgi_buffers 16 16k;
        fastcgi_buffer_size 32k;
        fastcgi_connect_timeout 30;
        fastcgi_send_timeout 60;
        fastcgi_read_timeout 60;
    }

    # ========== Deny access to dot-files ==========
    location ~ /\.(?!well-known) {
        deny all;
        access_log off;
        log_not_found off;
    }

    # ========== Gzip compression ==========
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_min_length 256;
    gzip_types
        text/plain
        text/css
        text/javascript
        text/xml
        text/js
        application/javascript
        application/json
        application/xml
        application/rss+xml
        application/manifest+json
        image/svg+xml
        font/ttf
        font/otf;
}