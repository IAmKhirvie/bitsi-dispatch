; ==============================================================================
; BITSI Dispatch — PHP OPcache Configuration for Production
; ==============================================================================
; Drop this file into your server's PHP conf.d directory,
; e.g., /etc/php/8.2/fpm/conf.d/99-bitsi-opcache.ini
; or   /etc/php/8.2/cli/conf.d/99-bitsi-opcache.ini
;
; Then restart PHP-FPM: sudo systemctl restart php8.2-fpm
; ==============================================================================

; 1 — Enable the OPcache extension
opcache.enable=1

; 1 — Preload shared memory at process start (recommended)
opcache.enable_cli=1

; Memory (MB) for compiled PHP code
; For a medium Laravel app, 128–256 MB is good
opcache.memory_consumption=256

; How many strings (classes, functions, methods) to cache
; Increase if you have many classes/routes
opcache.interned_strings_buffer=32

; Max number of cached script files
; Set based on `find . -name '*.php' | wc -l` in your project root
opcache.max_accelerated_files=20000

; Don't revalidate files on every request — huge performance gain
opcache.validate_timestamps=0

; How long (in seconds) to wait before checking for updated files
; Only used if validate_timestamps=1
opcache.revalidate_freq=2

; Maximum wasted memory percentage before restart (5% is sane)
opcache.max_wasted_percentage=5

; Use current working directory as key part to avoid collisions
opcache.use_cwd=1

; Save file comments/annotations (needed by some packages)
; Set to 0 for best performance if no annotations are relied upon
opcache.save_comments=1

; Record errors from the opcode cache (enable for debugging)
opcache.record_warnings=0

; Path to the shared lockfile (for CLI workers)
; opcache.lockfile_path=/tmp

; ==============================================================================
; Production Tuning — enable these once validated
; ==============================================================================

; Fast shutdown (speeds up request termination)
opcache.fast_shutdown=1

; File update protection (set to 0 in production with deployments)
opcache.validate_timestamps=0

; Consistency checks during compilation (disable for speed)
opcache.consistency_checks=0

; File cache (persistent file-based cache)
; opcache.file_cache=/tmp/opcache-file-cache
; opcache.file_cache_only=0
; opcache.file_cache_consistency_checks=1

; Huge code pages (Linux only, ~10% perf gain if supported)
opcache.huge_code_pages=1

; ==============================================================================
; Preloading (PHP 7.4+) — even bigger performance boost
; ==============================================================================
; Uncomment the lines below after creating a preload.php script:
;
; opcache.preload=/var/www/bitsi-dispatch/preload.php
; opcache.preload_user=www-data
;
; See: https://laravel.com/docs/12.x/deployment#preloading